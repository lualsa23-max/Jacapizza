{% extends "base.html" %}
{% block title %}— {{ titulo }}{% endblock %}
{% block content %}
<h2 class="sec-title">{{ icono }} {{ titulo }}</h2>
<div style="display:flex;gap:8px;margin-bottom:14px">
  <a href="{{ url_for('admin_menu_pizzas') }}" class="btn btn-sm {% if tipo=='pizzas' %}btn-primary{% else %}btn-ghost{% endif %}">🍕 Pizzas</a>
  <a href="{{ url_for('admin_menu_bebidas') }}" class="btn btn-sm {% if tipo=='bebidas' %}btn-primary{% else %}btn-ghost{% endif %}">🥤 Bebidas</a>
</div>

{% for nombre, precio in menu.items() %}
<div class="card mb-8">
  <form method="post" style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap">
    <input type="hidden" name="action" value="update">
    <input type="hidden" name="old_name" value="{{ nombre }}">
    <div style="flex:2;min-width:140px">
      <label class="form-label">Nombre</label>
      <input class="form-input" type="text" name="new_name" value="{{ nombre }}" style="min-height:40px;font-size:.88rem">
    </div>
    <div style="flex:1;min-width:100px">
      <label class="form-label">Precio COP</label>
      <input class="form-input" type="number" name="precio" value="{{ precio }}" step="500" style="min-height:40px;font-size:.88rem">
    </div>
    <div style="display:flex;gap:6px">
      <button type="submit" class="btn btn-primary btn-sm" style="min-height:40px">Guardar</button>
      <button type="submit" name="action" value="delete"
              class="btn btn-danger btn-sm" style="min-height:40px"
              onclick="return confirm('¿Eliminar {{ nombre }}?')">🗑</button>
    </div>
  </form>
</div>
{% endfor %}

<div class="card mt-16">
  <h3 style="font-size:.9rem;font-weight:700;margin-bottom:12px">➕ Agregar ítem</h3>
  <form method="post">
    <input type="hidden" name="action" value="add">
    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end">
      <div style="flex:2;min-width:140px">
        <label class="form-label">Nombre</label>
        <input class="form-input" type="text" name="name" placeholder="Nombre del ítem" style="min-height:40px;font-size:.88rem">
      </div>
      <div style="flex:1;min-width:100px">
        <label class="form-label">Precio COP</label>
        <input class="form-input" type="number" name="precio" placeholder="20000" step="500" style="min-height:40px;font-size:.88rem">
      </div>
      <button type="submit" class="btn btn-green" style="min-height:40px">➕ Agregar</button>
    </div>
  </form>
</div>
{% endblock %}
